name: Portfolio Watch (Evening)

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 20:00 SGT (UTC+8), Mon–Fri
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance requests pytz feedparser

      - name: Run portfolio report
        env:
          PORTFOLIO_BOT_TOKEN: ${{ secrets.PORTFOLIO_BOT_TOKEN }}
          PORTFOLIO_CHAT_ID: ${{ secrets.PORTFOLIO_CHAT_ID }}
        run: python portfolio_report.py
