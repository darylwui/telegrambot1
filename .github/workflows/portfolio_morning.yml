name: Portfolio Watch (Morning)

on:
  schedule:
    - cron: '23 0 * * 2-6'   # 08:23 SGT (UTC+8), Tue–Sat
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portfolio-watch
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance requests pytz pandas

      - name: Run portfolio report
        env:
          PORTFOLIO_BOT_TOKEN: ${{ secrets.PORTFOLIO_BOT_TOKEN }}
          PORTFOLIO_CHAT_ID:   ${{ secrets.PORTFOLIO_CHAT_ID }}
          # Optional — fine-grained PAT with `contents:read` on darylwui/trading-research.
          # Without it, the brief-embed feature is silently skipped.
          BRIEF_REPO_TOKEN:    ${{ secrets.BRIEF_REPO_TOKEN }}
        run: python portfolio_report.py

      - name: Commit history snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio_history.json
          if git diff --cached --quiet; then
            echo "no history change to commit"
          else
            git commit -m "Portfolio snapshot: $(TZ=Asia/Singapore date +%Y-%m-%d) AM"
            git pull --rebase origin master || true
            git push
          fi
