name: Portfolio Watch (Market Open)

on:
  schedule:
    # US market open 09:30 ET = 13:30 UTC (EDT) / 14:30 UTC (EST). Mon–Fri.
    # Winter (EST) this fires ~1h before the bell; GitHub's 2–4h scheduler
    # drift means delivery still lands during/after the session either way.
    - cron: '30 13 * * 1-5'   # 13:30 UTC — US open (EDT), ~21:30 SGT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portfolio-watch
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance requests pytz pandas

      - name: Run portfolio report
        env:
          PORTFOLIO_BOT_TOKEN: ${{ secrets.PORTFOLIO_BOT_TOKEN }}
          PORTFOLIO_CHAT_ID:   ${{ secrets.PORTFOLIO_CHAT_ID }}
          # Optional — fine-grained PAT with `contents:read` on darylwui/trading-research.
          # Without it, the brief-embed feature is silently skipped.
          BRIEF_REPO_TOKEN:    ${{ secrets.BRIEF_REPO_TOKEN }}
        run: python portfolio_report.py

      - name: Commit history snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio_history.json watchlist_state.json earnings_cache.json .garp_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no history change to commit"
          else
            git commit -m "Portfolio snapshot: $(TZ=Asia/Singapore date +%Y-%m-%d) OPEN"
            git pull --rebase origin master || true
            git push
          fi
